name: Bankrot Agent

on:
  schedule:
    - cron: '0 5 * * *'   # 08:00 Moscow (UTC+3)
    - cron: '0 7 * * *'   # 10:00
    - cron: '0 9 * * *'   # 12:00
    - cron: '0 11 * * *'  # 14:00
    - cron: '0 13 * * *'  # 16:00
    - cron: '0 15 * * *'  # 18:00
    - cron: '0 17 * * *'  # 20:00
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run agent
        env:
          TBANKROT_LOGIN: ${{ secrets.TBANKROT_LOGIN }}
          TBANKROT_PASSWORD: ${{ secrets.TBANKROT_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python agent.py --now
