name: Bankrot Agent v9

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'все/квартира/дом/коммерция/земля/авто'
        required: false
        default: 'все'

jobs:
  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Установка
        run: |
          pip install playwright httpx pdfplumber python-telegram-bot python-dotenv schedule
          playwright install chromium
          playwright install-deps chromium
      - name: Запуск
        env:
          TBANKROT_LOGIN:    ${{ secrets.TBANKROT_LOGIN }}
          TBANKROT_PASSWORD: ${{ secrets.TBANKROT_PASSWORD }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CAT="${{ github.event.inputs.category }}"
          if [ -z "$CAT" ] || [ "$CAT" = "все" ]; then
            python agent.py --now
          else
            python agent.py --cat "$CAT"
          fi
