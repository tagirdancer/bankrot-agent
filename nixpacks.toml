# Chromium for Playwright on Railway (Ubuntu Noble).
[variables]
PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS = "1"

[phases.setup]
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "libdrm2",
  "libdbus-1-3", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxrandr2",
  "libgbm1", "libasound2t64", "libpango-1.0-0", "libcairo2", "fonts-liberation",
  "libxfixes3", "libx11-6", "libx11-xcb1", "libxcb1", "libxext6", "libxi6",
  "libxtst6", "libgtk-3-0", "libgdk-pixbuf-2.0-0",
  "tesseract-ocr", "tesseract-ocr-rus", "tesseract-ocr-eng",
]

[phases.tesseract-check]
dependsOn = ["setup"]
cmds = ["which tesseract", "tesseract --version"]

[phases.playwright]
dependsOn = ["install"]
cmds = ["playwright install chromium"]
